name: clang-tidy
description: ""

inputs:
  rosdistro:
    description: ""
    required: true
  clang-tidy-config-url:
    description: ""
    required: true
  clang-tidy-ignore-path:
    description: ""
    required: false
    default: .clang-tidy-ignore
  target-packages:
    description: ""
    required: true
  target-files:
    description: ""
    required: false
  build-depends-repos:
    description: ""
    required: false
  cmake-build-type:
    description: ""
    required: false
    default: Release
  token:
    description: ""
    required: false
    default: ${{ github.token }}
  include-eol-distros:
    description: ""
    required: false
  cache-key-element:
    description: Will be part of the cache key
    default: default
    required: false
  underlay-workspace:
    description: Path to the underlay workspace containing setup.sh
    default: ""
    required: false
  artifact-name:
    description: Name of the artifact to upload
    default: clang-tidy-result
    required: false
  use-clang-tidy-cache:
    description: Enable ctcache to cache clang-tidy results for faster subsequent runs
    default: "false"
    required: false
  clang-tidy-cache-prune:
    description: Remove stale cache entries not accessed during this run (enable only for full-repo runs e.g. main branch)
    default: "false"
    required: false

runs:
  using: composite
  steps:
    - name: Install dependencies
      run: |
        sudo apt-get -yqq update
        sudo apt-get -yqq install curl python3-pip clang-tidy libomp-dev
      shell: bash

    - name: Install ctcache
      if: ${{ inputs.use-clang-tidy-cache == 'true' }}
      run: |
        sudo apt-get -yqq install pipx
        pipx install git+https://github.com/matus-chochlik/ctcache.git
        pipx ensurepath
        export PATH="$HOME/.local/bin:$PATH"
        printf '#!/bin/bash\nexport PATH="$HOME/.local/bin:$PATH"\nclang-tidy-cache $(which clang-tidy) "$@"\n' > /usr/local/bin/clang-tidy-cached
        chmod +x /usr/local/bin/clang-tidy-cached
      shell: bash

    - name: Set git config
      if: ${{ inputs.build-depends-repos != ''}}
      uses: autowarefoundation/autoware-github-actions/set-git-config@v1
      with:
        token: ${{ inputs.token }}

    - name: Clone dependency packages
      if: ${{ inputs.build-depends-repos != ''}}
      run: |
        mkdir -p dependency_ws
        vcs import --recursive dependency_ws < ${{ inputs.build-depends-repos }}
      shell: bash

    - name: Run rosdep install
      run: |
        package_paths=$(colcon list -p --packages-above-and-dependencies ${{ inputs.target-packages }} --base-paths . dependency_ws)
        sudo apt-get -yqq update
        if [ "${{ inputs.include-eol-distros }}" = "true" ]; then
            rosdep update --include-eol-distros
        else
            rosdep update
        fi
        if [ -f "${{ inputs.underlay-workspace }}/setup.sh" ]; then
          . ${{ inputs.underlay-workspace }}/setup.sh
        fi
        DEBIAN_FRONTEND=noninteractive rosdep install -yqq --from-paths ${package_paths} --ignore-src --rosdistro ${{ inputs.rosdistro }}
      shell: bash

    - name: Restore build files from cache
      id: restore-build-files
      uses: actions/cache/restore@v5
      with:
        path: |
          ./build
          ./install
        key: build-${{ runner.arch }}-${{ inputs.rosdistro }}-${{ inputs.cache-key-element }}-${{ inputs.cmake-build-type }}-${{ github.sha }}

    - name: Build
      if: ${{ steps.restore-build-files.outputs.cache-hit != 'true' }}
      run: |
        . /opt/ros/${{ inputs.rosdistro }}/setup.sh
        if [ -f "${{ inputs.underlay-workspace }}/setup.sh" ]; then
          . ${{ inputs.underlay-workspace }}/setup.sh
        fi
        colcon build --event-handlers console_cohesion+ \
          --packages-up-to ${{ inputs.target-packages }} \
          --cmake-args -DCMAKE_BUILD_TYPE=${{ inputs.cmake-build-type }} -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
      shell: bash

    - name: Retrieve .clang-tidy
      run: |
        curl -fsSL -o .clang-tidy ${{ inputs.clang-tidy-config-url }} \
          -H "Authorization: token ${{ inputs.token }}"
      shell: bash

    - name: Get clang-tidy version
      if: ${{ inputs.use-clang-tidy-cache == 'true' }}
      id: clang-tidy-version
      run: |
        echo "hash=$(clang-tidy --version | sha256sum | cut -d' ' -f1)" >> $GITHUB_OUTPUT
      shell: bash

    - name: Restore clang-tidy cache
      if: ${{ inputs.use-clang-tidy-cache == 'true' }}
      uses: actions/cache/restore@v5
      with:
        path: ${{ github.workspace }}/.ctcache
        key: clang-tidy-cache-${{ runner.arch }}-${{ inputs.rosdistro }}-${{ steps.clang-tidy-version.outputs.hash }}-${{ hashFiles('.clang-tidy') }}-${{ github.sha }}
        restore-keys: |
          clang-tidy-cache-${{ runner.arch }}-${{ inputs.rosdistro }}-${{ steps.clang-tidy-version.outputs.hash }}-${{ hashFiles('.clang-tidy') }}-

    - name: Get target files
      id: get-target-files
      run: |
        # Build ignore patterns (shared by both paths)
        ignore_patterns=()
        ignore_patterns+=( "*/test/*" )
        if [ -f ${{ inputs.clang-tidy-ignore-path }} ]; then
          while IFS= read -r pattern; do
            ignore_patterns+=( "$pattern" )
          done < ${{ inputs.clang-tidy-ignore-path }}
        fi

        if [ "${{ inputs.target-files }}" != "" ]; then
          # Filter the provided target files against ignore patterns
          filtered_files=""
          for file in ${{ inputs.target-files }}; do
            skip=false
            for pattern in "${ignore_patterns[@]}"; do
              # shellcheck disable=SC2254
              case "$file" in $pattern) skip=true; break ;; esac
            done
            if [ "$skip" = false ]; then
              filtered_files="$filtered_files $file"
            fi
          done
          target_files="${filtered_files# }"
        else
          mapfile -t package_paths < <(colcon list --paths-only --packages-select ${{ inputs.target-packages }})
          find_ignore_args=()
          for pattern in "${ignore_patterns[@]}"; do
            find_ignore_args+=( -not -path "$pattern" )
          done
          target_files=$(find "${package_paths[@]}" -name '*.cpp' "${find_ignore_args[@]}" | tr '\n' ' ')
        fi
        echo "target-files=$target_files" >> $GITHUB_OUTPUT
      shell: bash

    - name: Show target files
      if: ${{ steps.get-target-files.outputs.target-files != '' }}
      run: |
        echo "Target files:"
        for file in "${{ steps.get-target-files.outputs.target-files }}" ; do
          echo $file
        done
      shell: bash

    - name: Analyze
      if: ${{ steps.get-target-files.outputs.target-files != '' }}
      run: |
        mkdir /tmp/clang-tidy-result
        cache_flag=""
        if [ "${{ inputs.use-clang-tidy-cache }}" = "true" ]; then
          export CTCACHE_DIR="${GITHUB_WORKSPACE}/.ctcache"
          export CTCACHE_SAVE_OUTPUT=1
          mkdir -p "$CTCACHE_DIR"
          cache_flag="-clang-tidy-binary clang-tidy-cached"
          echo "::group::ctcache config"
          echo "CTCACHE_DIR=$CTCACHE_DIR"
          echo "Cache entries before: $(find "$CTCACHE_DIR" -type f 2>/dev/null | wc -l)"
          echo "Cache size before: $(du -sh "$CTCACHE_DIR" 2>/dev/null | cut -f1)"
          echo "::endgroup::"
        fi
        touch /tmp/.ctcache-marker
        run-clang-tidy $cache_flag -p build/ -export-fixes /tmp/clang-tidy-result/fixes.yaml -j $(nproc) ${{ steps.get-target-files.outputs.target-files }} > /tmp/clang-tidy-result/report.log && true
        echo "exit_code=$?" >> $GITHUB_ENV
        if [ "${{ inputs.use-clang-tidy-cache }}" = "true" ]; then
          echo "::group::ctcache stats after analysis"
          echo "Cache entries: $(find "$CTCACHE_DIR" -type f 2>/dev/null | wc -l)"
          echo "Cache size: $(du -sh "$CTCACHE_DIR" 2>/dev/null | cut -f1)"
          echo "::endgroup::"
          if [ "${{ inputs.clang-tidy-cache-prune }}" = "true" ]; then
            echo "::group::ctcache prune"
            stale_count=$(find "$CTCACHE_DIR" -type f -not -newer /tmp/.ctcache-marker 2>/dev/null | wc -l)
            echo "Pruning $stale_count stale cache entries not accessed during this run"
            find "$CTCACHE_DIR" -type f -not -newer /tmp/.ctcache-marker -delete 2>/dev/null
            find "$CTCACHE_DIR" -type d -empty -delete 2>/dev/null
            echo "Cache entries after prune: $(find "$CTCACHE_DIR" -type f 2>/dev/null | wc -l)"
            echo "Cache size after prune: $(du -sh "$CTCACHE_DIR" 2>/dev/null | cut -f1)"
            echo "::endgroup::"
          fi
        fi
        echo "${{ github.event.number }}" > /tmp/clang-tidy-result/pr-id.txt
        echo "${{ github.event.pull_request.head.repo.full_name }}" > /tmp/clang-tidy-result/pr-head-repo.txt
        echo "${{ github.event.pull_request.head.ref }}" > /tmp/clang-tidy-result/pr-head-ref.txt
      shell: bash

    - name: Save clang-tidy cache
      if: ${{ inputs.use-clang-tidy-cache == 'true' }}
      uses: actions/cache/save@v5
      with:
        path: ${{ github.workspace }}/.ctcache
        key: clang-tidy-cache-${{ runner.arch }}-${{ inputs.rosdistro }}-${{ steps.clang-tidy-version.outputs.hash }}-${{ hashFiles('.clang-tidy') }}-${{ github.sha }}

    - name: Check if the report.log file exists
      id: check-report-log-existence
      uses: autowarefoundation/autoware-github-actions/check-file-existence@v1
      with:
        files: /tmp/clang-tidy-result/report.log

    - name: Check if the fixes.yaml file exists
      id: check-fixes-yaml-existence
      uses: autowarefoundation/autoware-github-actions/check-file-existence@v1
      with:
        files: /tmp/clang-tidy-result/fixes.yaml

    - name: Upload artifacts
      if: ${{ steps.check-report-log-existence.outputs.exists == 'true' && steps.check-fixes-yaml-existence.outputs.exists == 'true' }}
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.artifact-name }}
        path: /tmp/clang-tidy-result/

    - name: Mark the workflow as failed if clang-tidy find an error
      if: ${{ env.exit_code != '0' }}
      run: exit 1
      shell: bash
